<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadhaar Print Pro | Gourob Tools</title>

<link rel="stylesheet" href="../pages/css/aadhaar.css">

</head>
<body>

<header class="topbar">

<div class="logo">
🪪 Gourob Tools
</div>

<h1>Aadhaar Print Pro</h1>

</header>

<main class="container">

<section class="upload-card">

<h2>Front Side</h2>

<input
type="file"
id="frontImage"
accept="image/*">

<div class="preview-box">

<img
id="frontPreview"
alt="Front Preview">

</div>

</section>

<section class="upload-card">

<h2>Back Side</h2>

<input
type="file"
id="backImage"
accept="image/*">

<div class="preview-box">

<img
id="backPreview"
alt="Back Preview">

</div>

</section>

<section class="actions">

<button id="printBtn">
🖨 Print
</button>

<button id="clearBtn">
❌ Clear
</button>

</section>

</main>

<script src="../pages/js/aadhaar.js"></script>

</body>
</html>

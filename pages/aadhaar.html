<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Aadhaar Print Pro</title>

<link rel="stylesheet" href="../pages/css/aadhaar.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css">
  
</head>

<body>

<div class="container">

<h1>🪪 Aadhaar Print Pro</h1>

<div class="uploadArea">

<div class="cardBox">

<h2>Aadhaar Front</h2>

<input
type="file"
id="frontInput"
accept="image/*">

<div class="preview">

<img id="frontPreview">

</div>

<div class="tools">

<button id="frontCrop">

Crop

</button>

<button id="frontLeft">

↺

</button>

<button id="frontRight">

↻

</button>

<button id="frontRemove">

Remove

</button>

</div>

</div>

<div class="cardBox">

<h2>Aadhaar Back</h2>

<input
type="file"
id="backInput"
accept="image/*">

<div class="preview">

<img id="backPreview">

</div>

<div class="tools">

<button id="backCrop">

Crop

</button>

<button id="backLeft">

↺

</button>

<button id="backRight">

↻

</button>

<button id="backRemove">

Remove

</button>

</div>

</div>

</div>

<h2>A4 Preview</h2>

<div class="a4">

<div class="card frontCard">

<img id="printFront">

</div>

<div class="card backCard">

<img id="printBack">

</div>

</div>

<div class="bottomButtons">

<button id="fitBtn">

Fit To Page

</button>

<button id="actualBtn">

Actual Size

</button>

<button id="resetBtn">

Reset

</button>

<button id="printBtn">

🖨 Print

</button>

<button id="pdfBtn">

PDF

</button>

</div>
  
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
  
<script src="../pages/js/aadhaar.js"></script>

</body>

</html>
